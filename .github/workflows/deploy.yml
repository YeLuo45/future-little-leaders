.name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - run: npm ci
      - run: npm run build:h5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/build/h5
      - uses: actions/deploy-pages@v4
